name: cab-backend

services:
  - name: api
    source_dir: /backend
    github:
      repo: williamscott701/cab
      branch: main
      deploy_on_push: true
    run_command: node src/app.js
    build_command: npm ci --omit=dev
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 10
      period_seconds: 30
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_NAME
        value: "Admin"
      - key: ADMIN_PHONE
        scope: RUN_TIME
        type: SECRET
