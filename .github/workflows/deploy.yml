name: Deploy to droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /apps/cab
            git pull origin main
            cd backend
            npm ci --omit=dev
            pm2 restart cab
            echo "cab deployed successfully"
